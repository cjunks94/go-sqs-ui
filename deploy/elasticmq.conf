# ElasticMQ config — pre-creates a source queue and its DLQ wired via redrive,
# so the app's DLQ detection and message-retry features can be exercised locally.
# Docs: https://github.com/softwaremill/elasticmq

include classpath("application.conf")

node-address {
  protocol = http
  host = localhost
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  demo-orders-queue {
    deadLettersQueue {
      name = "demo-orders-dlq"
      maxReceiveCount = 3
    }
  }
  demo-orders-dlq { }

  demo-notifications-queue {
    deadLettersQueue {
      name = "demo-notifications-dlq"
      maxReceiveCount = 3
    }
  }
  demo-notifications-dlq { }
}
